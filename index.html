<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lycorp Tech Blog preview with AI summaries and translation recommendations.">
    <title>Lycorp Tech Blog | AI Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --bg-accent: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-glow: #38bdf8;
            --border-color: rgba(56, 189, 248, 0.2);
            --card-bg: rgba(30, 41, 59, 0.6);
            
            --lang-ko: #f43f5e;
            --lang-ja: #10b981;
            --lang-en: #3b82f6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(244, 63, 94, 0.05), transparent 25%);
        }

        header {
            text-align: center;
            padding: 3rem 1rem;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 1) 0%, rgba(15, 23, 42, 0) 100%);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        h1 {
            margin: 0;
            font-size: 2.75rem;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(56, 189, 248, 0.3);
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-top: 1rem;
            font-size: 1.1rem;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            max-width: 1440px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .col-header {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            padding: 1rem;
            border-radius: 12px;
            background: var(--bg-accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Language specific decors */
        .column:nth-child(1) .col-header { color: var(--lang-ko); border-bottom: 2px solid var(--lang-ko); }
        .column:nth-child(2) .col-header { color: var(--lang-ja); border-bottom: 2px solid var(--lang-ja); }
        .column:nth-child(3) .col-header { color: var(--lang-en); border-bottom: 2px solid var(--lang-en); }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.75rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 16px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.3), 0 0 20px rgba(56, 189, 248, 0.15);
            background: rgba(30, 41, 59, 0.8);
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            line-height: 1.5;
        }

        .card-title a {
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .card-title a:hover {
            color: var(--accent-glow);
        }

        .card-date {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 1.25rem;
            font-weight: 500;
        }

        .card-summary {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #cbd5e1;
            flex-grow: 1;
            margin-bottom: 1.5rem;
            background: rgba(15, 23, 42, 0.4);
            padding: 1rem;
            border-radius: 8px;
        }

        .badge {
            display: inline-block;
            background: rgba(56, 189, 248, 0.2);
            color: #7dd3fc;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .card-rec {
            margin-top: auto;
            background: linear-gradient(to right, rgba(56, 189, 248, 0.1), transparent);
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #e2e8f0;
            border-left: 3px solid #0ea5e9;
        }

        .card-rec strong {
            color: #38bdf8;
            font-weight: 600;
        }

        @media (max-width: 1200px) {
            .container {
                gap: 1.5rem;
                padding: 2rem 1rem;
            }
        }

		@media (max-width: 1024px) {
            .container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            header {
                padding: 2rem 1rem;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Lycorp Tech Blog Radar</h1>
        <div class="subtitle">AI-Powered Cross-lingual Article Analysis</div>
    </header>
    
    <main class="container">
        {{range .}}
        <section class="column">
            <div class="col-header">{{.Language}}</div>
            {{range .Articles}}
            <article class="card">
                <div class="badge">Article</div>
                <h2 class="card-title"><a href="{{.Link}}" target="_blank" rel="noopener noreferrer">{{.Title}}</a></h2>
                <div class="card-date">{{.Published}}</div>
                <div class="card-summary">
                    {{.Summary}}
                </div>
                <div class="card-rec">
                    <strong>翻譯評估：</strong> {{.TranslationRec}}
                </div>
            </article>
            {{end}}
        </section>
        {{end}}
    </main>
</body>
</html>
